name: Release desktop builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-appimage:
    name: Build Linux AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            artifact: dez-linux-x86_64-appimage
          - arch: arm64
            runner: ubuntu-22.04-arm
            artifact: dez-linux-arm64-appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run build:linux:appimage

      - name: Stage AppImage release asset
        run: |
          mkdir -p release-assets
          version="${GITHUB_REF_NAME#v}"
          appimages=(src-tauri/target/release/bundle/appimage/*.AppImage)

          if [ "${#appimages[@]}" -ne 1 ] || [ ! -f "${appimages[0]}" ]; then
            echo "Expected exactly one AppImage, found ${#appimages[@]}"
            printf '%s\n' "${appimages[@]}"
            exit 1
          fi

          cp "${appimages[0]}" "release-assets/Dez_${version}_linux_${{ matrix.arch }}.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-assets/*.AppImage
          if-no-files-found: error

  build-macos-dmg:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-latest

    env:
      APPLE_SIGNING_IDENTITY: '-'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build unsigned Apple Silicon DMG
        run: npm run build:macos:dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dez-macos-aarch64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-22.04
    needs:
      - build-linux-appimage
      - build-macos-dmg

    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x86_64 AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: dez-linux-x86_64-appimage
          path: release-assets

      - name: Download ARM64 AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: dez-linux-arm64-appimage
          path: release-assets

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: dez-macos-aarch64-dmg
          path: release-assets

      - name: Create release if needed
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file .github/release-notes-template.md
          fi

      - name: Upload release assets
        run: gh release upload "$TAG_NAME" release-assets/* --clobber
