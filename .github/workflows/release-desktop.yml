name: Release desktop builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run build:linux:appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: dez-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-macos-dmg:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-latest

    env:
      APPLE_SIGNING_IDENTITY: '-'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build unsigned Apple Silicon DMG
        run: npm run build:macos:dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dez-macos-aarch64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Ensure WiX Toolset (for MSI bundling)
        run: choco install -y wixtoolset --no-progress

      - name: Build Windows MSI
        run: npm run build:win

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dez-windows-msi
          path: D:\a\dez\dez\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi\*.msi
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-22.04
    needs:
      - build-linux-appimage
      - build-macos-dmg
      - build-windows-msi

    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: dez-linux-appimage
          path: release-assets

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: dez-macos-aarch64-dmg
          path: release-assets

      - name: Download Windows MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: dez-windows-msi
          path: release-assets

      - name: Create release if needed
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file .github/release-notes-template.md
          fi

      - name: Upload release assets
        run: gh release upload "$TAG_NAME" release-assets/* --clobber